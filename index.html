<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- fav icon link  -->
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- daisyUi and tailwind link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css link  -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#E4E4E7] min-h-screen py-20">
    <section class="max-w-[520px] mx-auto bg-white shadow rounded-lg p-8">
      <div class="text-center space-y-3">
        <div class="mx-auto w-fit">
          <img src="assets/github-logo.png" alt="github-logo" />
        </div>
        <h3 class="text-2xl font-semibold">GitHub Issues Tracker</h3>
        <p>Sign in to manage your issues</p>
      </div>
      <fieldset class="fieldset rounded-box p-4">
        <label class="text-base font-medium">Enter Username</label>
        <input
          id="text-input"
          type="text"
          class="input w-full"
          placeholder="Enter Username"
        />
        <span class="text-primary text-sm">Default: admin</span>

        <label class="text-base font-medium">Password</label>
        <input
          id="password-input"
          type="password"
          class="input w-full"
          placeholder="Enter Password"
        />
        <span class="text-primary text-sm">Default: admin123</span>

        <button type="button" id="login-btn" class="btn btn-primary mt-4 rounded-lg">
          Sign In
        </button>
      </fieldset>
      <div
        class="py-3 flex items-center text-sm text-gray-800 before:flex-1 before:border-t before:border-gray-200 before:me-6 after:flex-1 after:border-t after:border-gray-200 after:ms-6 dark:text-white dark:before:border-neutral-600 dark:after:border-neutral-600"
      >
        OR
      </div>

      <div class="text-center">
        <p class="text-gray-400 text-base">Demo Credentials:</p>
        <br />
        <div class="bg-[#F8FAFC] rounded-lg py-6">
          <p><span class="font-bold">Username:</span> admin</p>
          <p><span class="font-bold">Password:</span> admin123</p>
        </div>
      </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="myModal" class="modal modal-bottom sm:modal-middle">
      <div id="modal-box" class="modal-box"></div>
    </dialog>
    <script src="Js/login.js"></script>
  </body>
</html>
